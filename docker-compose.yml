services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: gate_progress
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gate_progress"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./server
    env_file:
      - ./server/.env.example
    environment:
      NODE_ENV: production
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: root
      PGDATABASE: gate_progress
      DATABASE_URL: postgresql://postgres:root@postgres:5432/gate_progress
      REDIS_URL: redis://redis:6379
      CLIENT_ORIGIN: http://localhost:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5000:5000"

  client:
    build:
      context: ./client
      args:
        REACT_APP_API_URL: /api
    depends_on:
      - api
    ports:
      - "3000:80"

  gateway:
    image: nginx:1.27-alpine
    depends_on:
      - api
      - client
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres-data:
